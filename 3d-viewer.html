<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Visualizador 3D — Factory Interactive</title>
    <link rel="icon" type="image/png" href="images/logo_site.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --gold: #b89c6e;
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      /* ── LOADING ── */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        transition:
          opacity 0.6s var(--ease),
          visibility 0.6s;
      }
      #loading.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(255, 255, 255, 0.08);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
      }
      .loading-err {
        margin-top: 12px;
        font-size: 0.78rem;
        color: #f07070;
        text-align: center;
        max-width: 320px;
        line-height: 1.5;
        display: none;
      }

      /* ── HUD superior ── */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 32px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.65) 0%,
          transparent 100%
        );
        pointer-events: none;
      }
      .hud-left {
        display: flex;
        align-items: center;
        gap: 16px;
        pointer-events: auto;
      }
      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 18px 8px 8px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.8);
        font-family: inherit;
        font-weight: 600;
        font-size: 0.85rem;
        cursor: pointer;
        text-decoration: none;
        white-space: nowrap;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition:
          background 0.25s,
          transform 0.25s;
      }
      .btn-back:hover {
        background: rgba(255, 255, 255, 0.13);
        transform: translateY(-2px);
      }
      .btn-back-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        font-size: 14px;
        transition: transform 0.3s var(--ease);
      }
      .btn-back:hover .btn-back-icon {
        transform: translateX(-3px);
      }
      .hud-title {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--gold);
      }
      .logo-hud {
        height: 28px;
        width: auto;
        opacity: 0.35;
        pointer-events: none;
      }

      /* ── HUD inferior ── */
      #hud-bottom {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        padding: 24px 32px;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.55) 0%,
          transparent 100%
        );
        pointer-events: none;
      }
      .controls-hint {
        display: flex;
        gap: 20px;
      }
      .hint-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.68rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.3);
      }
      .hint-key {
        padding: 2px 7px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 5px;
        font-size: 0.62rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <span class="loading-label">Carregando modelo</span>
      <span class="loading-err" id="err-msg"></span>
    </div>

    <div id="hud">
      <div class="hud-left">
        <a class="btn-back" href="fi-preview.html#admin">
          <span class="btn-back-icon">←</span>
          Voltar
        </a>
        <span class="hud-title">Visualizador 3D</span>
      </div>
      <img
        src="images/logo_site2.png"
        alt="Factory Interactive"
        class="logo-hud"
      />
    </div>

    <canvas id="canvas"></canvas>

    <div id="hud-bottom">
      <div class="controls-hint">
        <span class="hint-item"
          ><span class="hint-key">Arrastar</span> Orbitar</span
        >
        <span class="hint-item"><span class="hint-key">Scroll</span> Zoom</span>
        <span class="hint-item"
          ><span class="hint-key">Botão Dir.</span> Mover</span
        >
      </div>
    </div>

    <!-- Three.js UMD -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
      (function () {
        var canvas = document.getElementById("canvas");
        var loading = document.getElementById("loading");
        var errMsg = document.getElementById("err-msg");

        // ── RENDERER ──────────────────────────────────────────────
        var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.NoToneMapping; // baked não precisa de tone mapping

        // ── SCENE ─────────────────────────────────────────────────
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        // ── CÂMERA ────────────────────────────────────────────────
        var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 2000);
        camera.position.set(10, 8, 14);

        // ── CONTROLS ──────────────────────────────────────────────
        var controls = new THREE.OrbitControls(camera, canvas);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;

        // sem luzes — iluminação está bakeada na textura

        // ── GRID ──────────────────────────────────────────────────
        var grid = new THREE.GridHelper(100, 40, 0x333333, 0x222222);
        scene.add(grid);

        // ── RENDER ON DEMAND ──────────────────────────────────────
        var needsRender = true;
        function requestRender() { needsRender = true; }
        controls.addEventListener('change', requestRender);
        window.addEventListener('resize', requestRender);

        // ── CARREGA TEXTURA BAKEADA + MODELO ─────────────────────
        var bakedMat = null;
        var modelReady = false;

        new THREE.TextureLoader().load(
          'images/Cube_Bake_AO.jpg',
          function (tex) {
            tex.encoding = THREE.sRGBEncoding;
            tex.flipY = false; // GLB/GLTF usa UV com Y invertido
            bakedMat = new THREE.MeshBasicMaterial({ map: tex });
            if (modelReady) applyMat();
          }
        );

        function applyMat() {
          scene.traverse(function (child) {
            if (child.isMesh && bakedMat) child.material = bakedMat;
          });
          requestRender();
        }

        var loader = new THREE.GLTFLoader();
        loader.load(
          'images/3d_building.glb',

          function (gltf) {
            var model = gltf.scene;
            scene.add(model);

            var box = new THREE.Box3().setFromObject(model);
            var center = new THREE.Vector3();
            var size   = new THREE.Vector3();
            box.getCenter(center);
            box.getSize(size);
            var maxDim = Math.max(size.x, size.y, size.z);

            model.position.sub(center);
            model.position.y += size.y / 2;
            grid.position.y   = -size.y / 2;

            var dist = maxDim * 2.2;
            camera.position.set(dist * 0.6, dist * 0.4, dist * 0.8);
            controls.maxDistance = dist * 6;
            controls.minDistance = maxDim * 0.05;
            controls.target.set(0, 0, 0);
            controls.update();

            modelReady = true;
            if (bakedMat) applyMat();

            loading.classList.add('hidden');
            requestRender();
          },

          function (xhr) {
            if (xhr.total) {
              var pct = Math.round((xhr.loaded / xhr.total) * 100);
              document.querySelector(".loading-label").textContent =
                "Carregando… " + pct + "%";
            }
          },

          function (err) {
            console.error(err);
            document.querySelector(".loading-label").textContent =
              "Erro ao carregar";
            errMsg.style.display = "block";
            errMsg.textContent =
              "Verifique se o arquivo images/3d_building.glb existe e o site está rodando via servidor local (não via file://).";
          },
        );

        // ── RESIZE ────────────────────────────────────────────────
        window.addEventListener("resize", function () {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ── LOOP — renderiza só quando necessário ─────────────────
        // controls.update() com damping dispara 'change' enquanto anima —
        // quando para, não há mais 'change' e needsRender fica false.
        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          if (!needsRender) return;
          renderer.render(scene, camera);
          needsRender = false;
        }
        animate();
      })();
    </script>

    <div style="position:fixed;bottom:16px;right:20px;z-index:999;font-family:'Inter',sans-serif;font-size:0.62rem;letter-spacing:0.1em;color:rgba(255,255,255,0.22);pointer-events:none">
      Powered by <a href="https://factorystudio-one.vercel.app/" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.42);font-weight:600;text-decoration:none">Factory</a>
    </div>
  </body>
</html>
